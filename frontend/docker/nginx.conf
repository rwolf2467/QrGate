user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 16m;

    # Logs to container stdout/stderr so `docker logs` works.
    access_log /dev/stdout;
    error_log  /dev/stderr;

    server {
        listen 80 default_server;
        server_name _;

        root  /var/www/html;
        index index.php index.html;

        # Block direct access to config/secrets.
        location ~* /(config\.php|composer\.(json|lock))$ {
            deny all;
            return 404;
        }
        location ~ /\.(?!well-known) {
            deny all;
        }

        # Pretty URL for the first-run setup wizard.
        rewrite ^/install/?$ /install.php last;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }
}
