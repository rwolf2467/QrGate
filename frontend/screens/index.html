<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Selector</title>
    <meta name="theme-color" content="#0B0B0B">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.10-beta.2/dist/basecoat.cdn.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- avocloud.css must load after basecoat -->
    <link rel="stylesheet" href="../assets/avocloud.css">
    <style>
        body {
            line-height: 1.6;
            background-image: repeating-linear-gradient(45deg, var(--avo-surface) 0, var(--avo-surface) 3.1px, var(--avo-bg) 0, var(--avo-bg) 50%);
            background-size: 31px 31px;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .group {
            background: color-mix(in oklab, var(--avo-surface) 80%, transparent);
            border: 1px solid var(--avo-border);
            transition: all 0.3s ease;
            backdrop-filter: blur(30px);
            position: relative;
            z-index: 1;
            border-radius: var(--avo-radius-lg);
        }

        .group:hover {
            border-color: var(--avo-primary);
            background: color-mix(in oklab, var(--avo-primary) 10%, transparent);
        }

        button {
            background: var(--avo-coral-500);
            color: #fff;
            font-weight: 700;
            transition: background 0.18s, transform 0.06s;
            border-radius: var(--avo-radius-md);
            padding: 14px;
            font-family: var(--avo-font-body);
        }

        button:hover {
            background: var(--avo-coral-600);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: var(--avo-text-muted);
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="avo-topbar" aria-hidden="true"></div>
    <div class="animate-fade-in">
        <div class="container mx-auto px-4 py-12">
            <div class="avo-kicker">// screen software</div>
            <h1 style="font-size: 40px;">Select your <span class="avo-hl">screen</span></h1>
            <h3 class="avo-muted" style="margin-bottom: 2rem;">Pick a display to launch.</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <button onclick="location.href='/screens/welcome.php'">Welcome Screen</button>
                <button onclick="location.href='/screens/title.php'">Title Screen</button>
                <button onclick="location.href='/screens/feedback.php'">Feedback Screen</button>
            </div>
        </div>
    </div>
</body>

</html>
